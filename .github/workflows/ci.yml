name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: poach sequential round trip passing tests
        shell: bash
        run: |
          set -euo pipefail
          output=$(cargo run --release --bin poach -- tests/passing out/passing sequential-round-trip)
          printf '%s\n' "$output"
          grep -q "0 failures" <<<"$output"