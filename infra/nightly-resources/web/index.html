<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poach Nightly</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <h1>Poach Nightly</h1>
      <p id="status">Loading <code>data/data.json</code>...</p>
      <div id="contents">
        <section>
          <h2>Summary</h2>
          <p id="summary"></p>
        </section>
        <section>
          <h2>Benchmarks</h2>
          <table id="benchmarks">
            <thead>
              <tr>
                <th>Benchmark</th>
                <th>Rule running</th>
                <th>Extraction</th>
                <th>Other</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </div>
    </main>

    <script type="module" src="./index.js"></script>
  </body>
</html>
